amcl:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    map_frame_id: "map"
    scan_topic: "scan"
    odom_topic: "/odometry/filtered"   # uncomment if using EKF

    # Odometry noise (increase lateral drift resistance)
    odom_alpha1: 1.5
    odom_alpha2: 1.5
    odom_alpha3: 2.5
    odom_alpha4: 2.0

    # Laser model (likelihood_field)
    laser_model_type: "likelihood_field"
    laser_min_range: 0.2
    laser_max_range: 8.0
    laser_max_beams: 60
    laser_z_hit: 0.95
    laser_z_rand: 0.05
    laser_likelihood_max_dist: 2.0
    laser_sigma_hit: 0.2          # optional, sharpens correction

    # Update frequency
    update_min_d: 0.01
    update_min_a: 0.01
    resample_interval: 1
    transform_tolerance: 1.0

    # Particle filter
    pf_min_particles: 500
    pf_max_particles: 5000
    pf_err: 0.05
    pf_z: 0.99

    # Initial pose (adjust to your robot's spawn in map frame)
    #initial_pose.x: 18.379
    #initial_pose.y: 4.347
    initial_pose.z: 0.0
    initial_pose.yaw: 0.0

