amcl:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"

    # Odometry model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    # alpha1: rot noise from rot,   alpha2: rot noise from trans
    # alpha3: trans noise from trans, alpha4: trans noise from rot
    odom_alpha1: 0.2
    odom_alpha2: 0.2
    odom_alpha3: 0.3
    odom_alpha4: 0.2

    # Laser model
    laser_model_type: "likelihood_field"
    laser_min_range: 0.2
    laser_max_range: 8.0
    laser_max_beams: 60
    laser_z_hit: 0.95
    laser_z_rand: 0.05
    laser_likelihood_max_dist: 2.0
    laser_sigma_hit: 0.2

    # Update gating
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    transform_tolerance: 1.0

    # Particle filter
    pf_min_particles: 500
    pf_max_particles: 5000
    pf_err: 0.05
    pf_z: 0.99

    # Initial pose handling — set via /initialpose at runtime
    set_initial_pose: false
    initial_pose.z: 0.0
    initial_pose.yaw: 0.0
